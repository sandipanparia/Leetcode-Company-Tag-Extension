<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    body {
      width: 320px;
      padding: 16px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #1a1a1a;
      color: #fff;
      margin: 0;
    }
    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 16px;
    }
    h2 { 
      margin: 0; 
      font-size: 16px; 
      color: #eff2f6; 
      font-weight: 600;
    }
    .toggle-btn {
      background: rgba(255, 255, 255, 0.1);
      border: 1px solid rgba(255, 255, 255, 0.2);
      color: #fff;
      padding: 6px 10px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 12px;
      transition: all 0.2s;
    }
    .toggle-btn:hover {
      background: rgba(255, 255, 255, 0.2);
    }
    input {
      width: 100%;
      padding: 10px 12px;
      box-sizing: border-box;
      background: #282828;
      border: 1px solid #3e3e3e;
      color: #fff;
      border-radius: 8px;
      margin-bottom: 12px;
      outline: none;
      font-size: 14px;
      transition: border-color 0.2s;
    }
    input:focus { 
      border-color: #ff9900; 
    }
    .results { 
      max-height: 250px; 
      overflow-y: auto; 
    }
    .item { 
      padding: 10px 8px; 
      border-bottom: 1px solid #2a2a2a; 
      display: flex; 
      flex-direction: column;
      gap: 4px;
    }
    .item:last-child { 
      border-bottom: none; 
    }
    .item-title { 
      font-size: 14px; 
      font-weight: 500;
    }
    .item-company { 
      font-size: 12px; 
      color: #8c8c8c; 
    }
    .no-results {
      color: #8c8c8c; 
      text-align: center; 
      padding: 20px 0;
      font-size: 14px;
    }
    
    /* Scrollbar */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #444; border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: #555; }
  </style>
</head>
<body>
  <div class="header">
    <h2>LeetCode Tags</h2>
    <button id="toggle-panel" class="toggle-btn">Toggle View</button>
  </div>
  <input type="text" id="search" placeholder="Search by problem or company...">
  <div class="results" id="results"></div>
  <script src="popup.js"></script>
</body>
</html>
